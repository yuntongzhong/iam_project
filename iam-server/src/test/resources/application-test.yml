spring:
  datasource:
    url: jdbc:h2:mem:iamtest;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  jackson:
    time-zone: Asia/Shanghai

app:
  security:
    issuer: http://127.0.0.1:8080
