<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo App A 已退出</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: oklch(0.978 0.012 94);
            --surface: oklch(0.992 0.004 95 / 0.92);
            --ink: oklch(0.225 0.02 52);
            --ink-soft: oklch(0.44 0.02 58);
            --teal: oklch(0.58 0.13 188);
            --shadow: 0 24px 80px rgba(59, 38, 16, 0.12);
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 14px;
            font-family: "Source Sans 3", "Microsoft YaHei", sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at 10% 10%, oklch(0.91 0.08 185 / 0.55), transparent 24%),
                radial-gradient(circle at 90% 15%, oklch(0.91 0.07 48 / 0.35), transparent 20%),
                linear-gradient(180deg, oklch(0.99 0.01 95), var(--bg));
        }
        .card {
            width: min(680px, 100%);
            padding: 24px;
            border-radius: 28px;
            background: var(--surface);
            border: 1px solid rgba(134, 100, 61, 0.12);
            box-shadow: var(--shadow);
        }
        .eyebrow {
            display: inline-flex;
            padding: 8px 14px;
            border-radius: 999px;
            background: color-mix(in oklch, var(--teal) 14%, white);
            color: oklch(0.35 0.08 192);
            font: 700 12px/1 "Lexend", sans-serif;
            letter-spacing: .12em;
            text-transform: uppercase;
        }
        h1 {
            margin: 16px 0 8px;
            font: 700 clamp(1.86rem, 4vw, 2.9rem)/1.05 "Lexend", sans-serif;
        }
        p {
            margin: 0;
            color: var(--ink-soft);
            line-height: 1.68;
            max-width: 58ch;
        }
        .summary {
            margin-top: 16px;
            padding: 16px;
            border-radius: 24px;
            background: color-mix(in oklch, var(--teal) 8%, white);
            color: var(--ink-soft);
        }
        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 20px;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 44px;
            padding: 0 18px;
            border-radius: 999px;
            border: 1px solid rgba(134, 100, 61, 0.14);
            background: rgba(255,255,255,.75);
            color: var(--ink);
            text-decoration: none;
            font-weight: 700;
        }
        .btn.primary {
            background: var(--ink);
            border-color: var(--ink);
            color: oklch(0.98 0.004 95);
        }
        @media (max-width: 680px) {
            .card { padding: 18px; border-radius: 22px; }
            .btn { width: 100%; }
        }
    </style>
</head>
<body>
<main class="card">
    <div class="eyebrow">Demo App A</div>
    <h1>单点登出已经完成</h1>
    <p>Demo App A 的本地会话已经结束，并向 IAM 发出了全局退出请求。再次访问受保护资源时，浏览器会重新进入统一身份中心的登录流程。</p>
    <div class="summary">你可以把这个页面当作 SLO 的结束态说明页：它强调的是“本地会话结束 + 全局会话回收 + 其他客户端收到退出指令”。</div>
    <div class="actions">
        <a class="btn primary" href="/">重新进入 Demo App A</a>
        <a class="btn" href="http://127.0.0.1:8082/">前往 Demo App B</a>
        <a class="btn" href="http://127.0.0.1:8080/admin.html">打开 IAM 管理台</a>
    </div>
</main>
</body>
</html>
